version: "3.8"

services:
  influxdb:
    image: influxdb:2.7
    container_name: monitor-influxdb
    restart: always
    ports:
      - "8086:8086"
    volumes:
      - /opt/oracle-monitor/data/influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=influxadmin123
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=oracle_metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-token-1234567890

  grafana:
    image: grafana/grafana:9.5.15
    container_name: monitor-grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - /opt/oracle-monitor/data/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana123
      - GF_INSTALL_PLUGINS=
    depends_on:
      - influxdb
